<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulip</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >
  <style>
    .project-card {
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s ease-in-out;
    }
    .project-card:hover {
      transform: translateY(-4px);
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4 font-monospace">TULIP CI/CD <img src="../img/tulip-logo.png"></h2>
    <div class="row g-4" id="projects-container">
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    $(document).ready(function () {
      const apiUrl = "http://localhost:8080/projects";

      $.get(apiUrl, function (data) {
        // data is an array of projects
        const container = $("#projects-container");

        data.forEach(project => {
          const card = `
            <div class="col-md-4">
              <div class="p-4 project-card h-100 d-flex flex-column">
                <h5>${project.name}</h5>
                <p class="flex-grow-1">${project.githubName}</p>
                <a href="http://localhost:8080/project/${project.githubName}" class="btn btn-primary btn-sm mt-auto">View Details</a>
              </div>
            </div>
          `;
          container.append(card);
        });
      })
      .fail(function () {
        $("#projects-container").html(
          `<div class="col-12 text-center text-danger">⚠️ Failed to load projects.</div>`
        );
      });
    });
  </script>
</body>
</html>
