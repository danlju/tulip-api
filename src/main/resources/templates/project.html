<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${projectId}"></title>
    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >
    <style>
        .project-card {
          border: 1px solid #ddd;
          border-radius: 0.5rem;
          box-shadow: 0 4px 8px rgba(0,0,0,0.1);
          transition: transform 0.2s ease-in-out;
        }
        .project-card:hover {
          transform: translateY(-4px);
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }
        .in-progress-blinking {
            text-align: center;
            margin-top: 20%;
            font-size: 24px;
            color: green;
            animation: blink 2s infinite;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 th:text="${projectId}" class="mb-4 text-center">error</h1>
    <div class="grid" id="projects-container">
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    $(document).ready(function () {
      // Example REST API endpoint (replace with your own)
      var projectId =  [[${projectId}]];
      const apiUrl = "http://localhost:8080/projects/" + projectId;

      $.get(apiUrl, function (data) {
        // data is an array of projects
        const container = $("#projects-container");

        data['workflow_runs'].forEach(workflow_run => {

            var statusClass = 'text-success';
            var status = '';

            if (!workflow_run.conclusion) {
                if (workflow_run.status == 'failed') {
                    statusClass = 'text-danger';
                } else if (workflow_run.status == 'in_progress'
                    || workflow_run.status == 'waiting'
                    || workflow_run.status == 'queued'
                    || workflow_run.status == 'requested') {
                    statusClass = 'in-progress-blinking text-primary';
                    status = 'in progress';
               }
           } else if (workflow_run.conclusion== 'failure') {
                statusClass = 'text-danger';
                status = 'failed';
           } else if (workflow_run.conclusion == 'success') {
                statusClass = 'text-success';
                status = 'success';
           }

          const card = `
            <div class="g-col-4">
              <div class="p-4 project-card h-100 d-flex flex-column">
                <h3 class="fw-bold">${workflow_run.run_number}</h3>
                <p><span class="fw-bold">Branch:</span> ${workflow_run.head_branch}</p>
                <p><span class="fw-bold">Commit:</span> ${workflow_run.display_title}</p>
                <p><span class="fw-bold">Hash:</span> ${workflow_run.head_sha}</p>
                <p><span class="fw-bold">Status:</span> <span class="${statusClass}">${status}</span></p>
              </div>
            </div>
          `;
          container.append(card);
        });
      })
      .fail(function () {
        $("#projects-container").html(
          `<div class="col-12 text-center text-danger">⚠️ Failed to load projects.</div>`
        );
      });
    });
</script>
</body>
</html>
