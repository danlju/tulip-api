<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${projectId}"></title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .project-card {
          border: 1px solid #ddd;
          border-radius: 0.5rem;
          box-shadow: 0 4px 8px rgba(0,0,0,0.1);
          transition: transform 0.2s ease-in-out;
        }
        .project-card:hover {
          transform: translateY(-4px);
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }
        .in-progress-blinking {
            color: green;
            animation: blink 2s infinite;
        }
        .sha-text {
            font-size: 0.85rem;
            display:inline-block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: "";
            max-width: 8ch;
        }
        .status-circle {
            font-size: 2.1rem;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="mb-4 font-monospace"><a style="color: #000; text-decoration: none" href="/">TULIP CI/CD </a><img src="../img/tulip-logo.png"></h2>
    <h5 th:text="${projectId}" class="mb-4">error</h5>
    <button id="new-build-btn">New build</button>
    <div class="g-col-4" id="new-build-div">

        <div class="p-4 project-card h-100 d-flex flex-column">
            <form id="start-build-form">
                <div class="form-group">
                    <label for="branch-input">Email address</label>
                    <input type="text" class="form-control" id="branch-input" name="branch" placeholder="branch (leave empty for 'main')" />
                    <input type="hidden" name="projectId" th:value="${projectId}"/>
                    <input type="hidden" name="owner" value="danlju" />
                    <input type="hidden" name="workflowId" value="188874644" />
                    <button type="button" id="start-build-btn" class="btn btn-primary btn-lg">Start build</button>
                </div>
            </form>
        </div>
    </div>
    <div class="grid" id="projects-container">
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">


    $(document).ready(function () {

        $("#start-build-btn").click(function(e) {

            $.ajax({

                url: "/projects/[(${projectId})]/run", // TODO: hardcoded
                type: "POST",
                contentType: "application/json",
                data: convertFormToJSON("#start-build-form"),

                success: function(data){
                    alert(data);
                }

            });

        });
    //});

      function convertFormToJSON(form) {
        const array = $(form).serializeArray(); // Encodes the set of form elements as an array of names and values.
        const json = {};
        $.each(array, function () {
          json[this.name] = this.value || "";
        });
        return JSON.stringify(json);
      }


          $("#new-build-btn").click(function(){
            $("#new-build-div").toggle();
          });

      $("#new-build-div").toggle();
      // Example REST API endpoint (replace with your own)
      var projectId =  [[${projectId}]];
      const apiUrl = "http://localhost:8080/projects/" + projectId;

      $.get(apiUrl, function (data) {
        // data is an array of projects
        const container = $("#projects-container");

        data['workflow_runs'].forEach(workflow_run => {

            var statusClass = 'text-success';
            var status = '';

            if (!workflow_run.conclusion) {
                if (workflow_run.status == 'failed') {
                    statusClass = 'text-danger';
                } else if (workflow_run.status == 'in_progress'
                    || workflow_run.status == 'waiting'
                    || workflow_run.status == 'queued'
                    || workflow_run.status == 'requested') {
                    statusClass = 'in-progress-blinking text-primary';
                    status = 'in progress';
               }
           } else if (workflow_run.conclusion== 'failure') {
                statusClass = 'text-danger';
                status = 'failed';
           } else if (workflow_run.conclusion == 'success') {
                statusClass = 'text-success';
                status = 'success';
           }

          const card = `
            <div class="g-col-4">
              <div class="p-4 project-card h-100 d-flex flex-column">
                <h3 class="fw-bold">${workflow_run.run_number}</h3>
                <p><span class="fw-bold">Branch:</span> ${workflow_run.head_branch}</p>
                <p><span class="fw-bold">Commit: </span>${workflow_run.display_title}  <a target="_blank" href="https://github.com/${workflow_run.repository.full_name}/commit/${workflow_run.head_sha}"><span class="sha-text">${workflow_run.head_sha}</span></a></p>
                <p><span class="fw-bold">Status:</span>

                <i class="status-circle bi bi-circle-fill ${statusClass}"></i>
                </p>
              </div>
            </div>
          `;
          container.append(card);
        });
      })
      .fail(function () {
        $("#projects-container").html(
          `<div class="col-12 text-center text-danger">⚠️ Failed to load projects.</div>`
        );
      });
    });
</script>
</body>
</html>
